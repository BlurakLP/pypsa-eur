# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#run
run:
  name: "DE01_test_adm"
  scenarios:
    enable: false
    file: config/scenarios.yaml
  disable_progressbar: false
  shared_resources:
    policy: false
    exclude: []
  shared_cutouts: true
  use_shadow_directory: false

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#foresight
foresight: overnight

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#scenario
# Wildcard docs in https://pypsa-eur.readthedocs.io/en/latest/wildcards.html
scenario:
  clusters:
  - adm
  opts:
  - 'Ep'
  sector_opts:
  - ''


# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#countries


countries: ['AT', 'BE', 'CH', 'CZ', 'DE', 'DK','FR','LU','NL', 'NO', 'PL', 'SE']


# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#snapshots
snapshots:
  start: "2013-01-01"
  end: "2014-01-01"
  inclusive: 'left'




# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#electricity
electricity:
  voltages: [220., 300., 330., 380., 400., 500., 750.]
  base_network: osm
  gaslimit_enable: false
  gaslimit: false
  co2limit_enable: false
  co2limit: 7.75e+7
  co2base: 1.487e+9

  operational_reserve:
    activate: false
    epsilon_load: 0.02
    epsilon_vres: 0.02
    contingency: 4000

  max_hours:
    battery: 6
    H2: 168

  extendable_carriers:
    Generator: []
    StorageUnit: [] 
    Store: []
    Link: [] 

  powerplants_filter: (DateOut >= 2024 or DateOut != DateOut) and not (Country == 'Germany' and Fueltype == 'Nuclear')
  custom_powerplants: false
  everywhere_powerplants: []

  conventional_carriers: [nuclear, oil, OCGT, CCGT, coal, lignite, geothermal, biomass]
  renewable_carriers: [solar, onwind, offwind-ac, hydro]

  estimate_renewable_capacities:
    enable: true
    from_gem: true
    year: 2013
    expansion_limit: false
    technology_mapping:
      Offshore: offwind-ac
      Onshore: onwind
      PV: solar

  autarky:
    enable: true
    by_country: false

  transmission_limit: vopt

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#atlite
atlite:
  cutout_directory: cutouts
  default_cutout: "europe-2013-sarah3-era5"   
  nprocesses: 1
  show_progress: true
  cutouts:
    "europe-2013-sarah3-era5":
      module: era5
      x: [-12., 42.]
      y: [33., 72.]
      dx: 0.3
      dy: 0.3
      time: ['2013']   


# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#costs
costs:
  year: 2025
  version: v0.13.3
  social_discountrate: 0.02



  overwrites: 
    fuel: 
      gas: 38
      coal: 11.6
      lignite: 2.3
      nuclear: 8
      biomass: 23.8

      

  emission_prices:
    enable: true
    co2: 72
    co2_monthly_prices: false

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#clustering
clustering:
  mode: administrative
  level: bz
  build_bidding_zones:
    remove_islands: false
    aggregate_to_tyndp: false
  simplify_network:
    to_substations: false
    remove_stubs: true
    remove_stubs_across_borders: false
  cluster_network:
    algorithm: kmeans
    hac_features:
    - wnd100m
    - influx_direct
  exclude_carriers: []
  consider_efficiency_classes: false
  aggregation_strategies:
    generators:
      committable: any
      ramp_limit_up: max
      ramp_limit_down: max
  temporal:
    resolution_elec: false
    resolution_sector: false

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#adjustments
solving:
  options:
    noisy_costs: false
  solver:
    name: highs
    options: highs-simplex 
  
  mem_mb: 8000                      # Memory limit
  #runtime: 48h                        # Time limit


